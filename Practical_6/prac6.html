<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unique Image Webpage</title>
<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.banner {
height: 60vh;
background: url("https://images.unsplash.com/photo-1521295121783-8a321d551ad2") center/cover
norepeat; display: flex; align-items: center; justify-content: center; color: white;
text-shadow: 2px 2px 10px black;
}
/* Make all gallery images same size */
.same-img {
height: 250px;
width: 100%;
object-fit: cover;
border-radius: 12px;
}
.img-hover {
overflow: hidden;
border-radius: 12px;
transition: 0.3s;
}
.img-hover img { width:
100%; transition: transform
0.4s ease;
}
.img-hover:hover img {
transform: scale(1.15);
}
</style>
</head>
<body>
<!-- Banner Section -->
<div class="banner">
<h1 class="fw-bold display-4">Explore Beautiful Places</h1>
</div>
<!-- Gallery Section -->
<div class="container my-5">
<h2 class="text-center mb-4">Photo Collection</h2>
<div class="row g-4">
<div class="col-md-4">
<div class="img-hover shadow-sm">
<img src="https://images.unsplash.com/photo-1519817914152-22d216bb9170"
class="same-img" alt="Nature" />
</div>
</div>
<div class="col-md-4">
<div class="img-hover shadow-sm">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
class="same-img" alt="River" />
</div>
</div>
<div class="col-md-4">
<div class="img-hover shadow-sm">
<img src="https://images.unsplash.com/photo-1500534623283-312aade485b7"
class="same-img" alt="Valley" />
</div>
</div>
</div>
</div>
<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
<p>© 2026 Unique Webpage Design</p>
</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
